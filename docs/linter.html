<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Kathakaar Studio — the grounded storyteller</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0c0a17; --bg2:#0f0d1f; --panel:#16142a; --panel2:#1d1a37; --panel3:#241f44;
    --ink:#f4f1fb; --muted:#a6a3c9; --faint:#6f6c93; --line:#2a2750;
    --gold:#e8b04b; --marigold:#f6a41c; --violet:#8b6dff; --indigo:#6d5cff;
    --green:#34d399; --rose:#fb7185; --parch:#f3ecdc;
    --sans:'Inter',-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:var(--sans);color:var(--ink);min-height:100vh;line-height:1.5;
    background:
      radial-gradient(1100px 560px at 88% -12%, #34245f 0, transparent 58%),
      radial-gradient(900px 520px at -8% 8%, #1c2b55 0, transparent 55%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    background-attachment:fixed;}
  .wrap{max-width:1120px;margin:0 auto;padding:30px 22px 64px}

  /* ---------- header ---------- */
  header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:14px}
  .glyph{width:46px;height:46px;border-radius:14px;flex:none;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--violet),var(--gold));box-shadow:0 8px 26px rgba(139,109,255,.35)}
  .glyph svg{width:26px;height:26px}
  h1{font-family:var(--serif);font-weight:600;font-size:30px;margin:0;letter-spacing:.2px}
  h1 .gold{color:var(--gold)}
  .tagline{color:var(--muted);font-size:13.5px;margin-top:3px}
  .status{display:flex;gap:8px;flex-wrap:wrap}
  .pill{font-size:12px;padding:6px 12px;border-radius:30px;border:1px solid var(--line);background:rgba(255,255,255,.02);
    display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
  .pill.on .dot{background:var(--green);box-shadow:0 0 0 3px rgba(52,211,153,.18)}
  .pill.prov .dot{background:var(--gold);box-shadow:0 0 0 3px rgba(232,176,75,.18)}
  .pill.off{color:var(--muted)}

  .lede{color:var(--muted);font-size:14.5px;max-width:74ch;margin:18px 0 22px}
  .lede b{color:var(--ink);font-weight:600}
  .lede .v{color:#c3b4ff}

  /* ---------- layout ---------- */
  .grid{display:grid;grid-template-columns:392px 1fr;gap:20px;align-items:start}
  @media(max-width:880px){.grid{grid-template-columns:1fr}}
  .card{background:linear-gradient(180deg,var(--panel),rgba(22,20,42,.72));border:1px solid var(--line);
    border-radius:20px;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.32)}
  .panel-title{font-size:11.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin:0 0 14px;font-weight:600}

  /* ---------- controls ---------- */
  .seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px;margin-bottom:18px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);padding:9px 10px;border-radius:9px;cursor:pointer;
    font-weight:600;font-size:13.5px;font-family:var(--sans);transition:.18s;display:flex;align-items:center;justify-content:center;gap:6px}
  .seg button.active{color:#1a1228;background:linear-gradient(95deg,var(--violet),var(--gold));box-shadow:0 6px 18px rgba(139,109,255,.3)}
  label{font-size:12.5px;color:var(--muted);display:block;margin:0 0 7px;font-weight:500}
  .field{margin-bottom:15px}
  select,input[type=text]{width:100%;padding:12px 13px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:14.5px;font-family:var(--sans);transition:.18s}
  select:focus,input[type=text]:focus{outline:0;border-color:var(--violet);box-shadow:0 0 0 3px rgba(139,109,255,.18)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:-4px}
  .chip{font-size:12px;padding:6px 11px;border-radius:30px;border:1px solid var(--line);background:var(--panel2);
    color:var(--muted);cursor:pointer;transition:.16s}
  .chip:hover{color:var(--ink);border-color:var(--violet);background:rgba(139,109,255,.12)}
  .go{margin-top:6px;width:100%;padding:14px;border:0;border-radius:13px;cursor:pointer;font-weight:700;font-size:15.5px;
    font-family:var(--sans);color:#1a1228;background:linear-gradient(95deg,var(--violet),var(--gold));
    box-shadow:0 12px 30px rgba(139,109,255,.32);transition:transform .1s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:9px}
  .go:hover{box-shadow:0 16px 38px rgba(139,109,255,.42)}
  .go:active{transform:translateY(1px) scale(.995)}
  .go:disabled{opacity:.65;cursor:wait}
  .drop{margin-top:14px;border:1.6px dashed var(--line);border-radius:14px;padding:18px;text-align:center;color:var(--muted);
    font-size:13px;cursor:pointer;transition:.18s}
  .drop:hover{border-color:var(--indigo);color:var(--ink)}
  .drop.hover{border-color:var(--violet);background:rgba(139,109,255,.1);color:var(--ink)}
  .drop b{color:var(--ink);font-weight:600}
  .drop img{max-height:130px;border-radius:10px;margin-top:10px;border:1px solid var(--line)}
  .tip{color:var(--faint);font-size:12px;margin:13px 2px 0;line-height:1.5}
  .tip b{color:var(--gold);font-weight:600}

  /* ---------- canvas ---------- */
  .canvas{min-height:420px;position:relative;overflow:hidden}
  .canvas::before{content:"";position:absolute;inset:0;background:
    radial-gradient(420px 220px
